name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["core"]
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: continuous_integration_build_make_cer0
        run: make cer0
      - name: continuous_integration_build_make_cer0_tools
        run: make tools
